<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guiné-Bissau — Jornada Cultural</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;0,700;1,300;1,600&family=DM+Mono:wght@300;400;500&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --g: #0f7a38;
  --r: #c8102e;
  --y: #f5c215;
  --k: #060606;
  --cream: #ede8dc;
  --earth: #7a4e2d;
  --gold: #c9973a;
  --sea: #163d5e;
  --sand: #d9c99a;
  --ink: #1a1a18;
  --glass: rgba(237,232,220,0.04);
  --glass2: rgba(237,232,220,0.08);
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; font-size:16px; }

body {
  font-family:'Cormorant Garamond', serif;
  background:var(--k);
  color:var(--cream);
  overflow-x:hidden;
  cursor:none;
}

/* ─── CURSOR ──────────────────────────────── */
#cur {
  width:8px; height:8px;
  background:var(--y);
  border-radius:50%;
  position:fixed; z-index:9999;
  pointer-events:none;
  transform:translate(-50%,-50%);
  transition:width .25s,height .25s,background .25s;
  mix-blend-mode:exclusion;
}
#cur-trail {
  width:36px; height:36px;
  border:1.5px solid rgba(245,194,21,.35);
  border-radius:50%;
  position:fixed; z-index:9998;
  pointer-events:none;
  transform:translate(-50%,-50%);
  transition:transform .12s cubic-bezier(.22,1,.36,1),
             width .3s,height .3s,border-color .3s;
}
body:has(a:hover) #cur,
body:has(button:hover) #cur { width:16px; height:16px; background:var(--y); }
body:has(a:hover) #cur-trail,
body:has(button:hover) #cur-trail { width:56px; height:56px; border-color:rgba(245,194,21,.6); }

/* ─── PROGRESS BAR ──────────────────────── */
#bar {
  position:fixed; top:0; left:0;
  height:2px; width:0;
  background:linear-gradient(90deg,var(--g),var(--y),var(--r));
  z-index:10000;
  box-shadow:0 0 12px var(--y);
}

/* ─── NAV ────────────────────────────────── */
nav {
  position:fixed; top:0; width:100%; z-index:999;
  padding:22px 64px;
  display:flex; justify-content:space-between; align-items:center;
  transition:background .4s, padding .4s, box-shadow .4s;
}
nav.scrolled {
  background:rgba(6,6,6,.92);
  backdrop-filter:blur(20px) saturate(1.4);
  padding:14px 64px;
  box-shadow:0 1px 0 rgba(245,194,21,.1);
}
.nav-logo {
  font-family:'Syne',sans-serif;
  font-weight:800; font-size:1.1rem;
  letter-spacing:4px; text-transform:uppercase;
  color:var(--y);
  display:flex; align-items:center; gap:12px;
}
.nav-flag-mini {
  display:flex; width:32px; height:20px; border-radius:2px; overflow:hidden;
  box-shadow:0 0 0 1px rgba(255,255,255,.1);
}
.nfr { background:var(--r); width:33%; display:flex; align-items:center; justify-content:center; font-size:8px; }
.nfg { background:var(--g); }
.nfy { background:var(--y); }
.nfright { width:67%; display:flex; flex-direction:column; }
.nav-links {
  display:flex; gap:28px; align-items:center;
}
.nav-links a {
  font-family:'DM Mono',monospace;
  font-size:.68rem; letter-spacing:.15em; text-transform:uppercase;
  color:rgba(237,232,220,.55); text-decoration:none;
  position:relative; transition:color .3s;
}
.nav-links a::after {
  content:'';
  position:absolute; bottom:-5px; left:0;
  height:1px; width:0; background:var(--y);
  transition:width .4s cubic-bezier(.22,1,.36,1);
}
.nav-links a:hover { color:var(--y); }
.nav-links a:hover::after { width:100%; }

/* ─── NOISE OVERLAY ──────────────────────── */
.noise {
  position:fixed; inset:0; z-index:9997; pointer-events:none;
  opacity:.025;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}

/* ─── HERO ───────────────────────────────── */
.hero {
  min-height:100vh;
  display:grid; place-items:center;
  position:relative; overflow:hidden;
}
.hero-bg {
  position:absolute; inset:0;
  background:
    radial-gradient(ellipse 80% 60% at 20% 110%, rgba(15,122,56,.32) 0%, transparent 55%),
    radial-gradient(ellipse 60% 50% at 80% -10%, rgba(200,16,46,.22) 0%, transparent 55%),
    radial-gradient(ellipse 100% 80% at 50% 50%, rgba(26,61,94,.18) 0%, transparent 70%),
    var(--k);
}
/* Animated gradient orbs */
.orb {
  position:absolute; border-radius:50%;
  filter:blur(80px); pointer-events:none;
  animation:orb-drift ease-in-out infinite alternate;
}
.orb1 { width:500px; height:500px; background:rgba(15,122,56,.18); top:-100px; left:-100px; animation-duration:12s; }
.orb2 { width:400px; height:400px; background:rgba(200,16,46,.15); bottom:-80px; right:-80px; animation-duration:9s; animation-delay:-3s; }
.orb3 { width:300px; height:300px; background:rgba(245,194,21,.1); top:40%; left:60%; animation-duration:15s; animation-delay:-7s; }
@keyframes orb-drift {
  from { transform:translate(0,0) scale(1); }
  to   { transform:translate(40px,30px) scale(1.15); }
}

/* Grid lines */
.hero-grid {
  position:absolute; inset:0; pointer-events:none;
  background-image:
    linear-gradient(rgba(245,194,21,.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(245,194,21,.04) 1px, transparent 1px);
  background-size:80px 80px;
  mask-image:radial-gradient(ellipse 80% 80% at center, black 30%, transparent 100%);
}

#hero-canvas {
  position:absolute; inset:0;
  pointer-events:none; z-index:1;
}

.hero-inner {
  position:relative; z-index:2;
  display:flex; flex-direction:column; align-items:center;
  text-align:center; padding:120px 40px 60px;
}
.hero-eyebrow {
  font-family:'DM Mono',monospace;
  font-size:.65rem; letter-spacing:.5em; text-transform:uppercase;
  color:var(--y); margin-bottom:40px;
  display:flex; align-items:center; gap:20px;
  opacity:0; animation:fade-up .8s .2s cubic-bezier(.22,1,.36,1) forwards;
}
.hero-eyebrow::before, .hero-eyebrow::after {
  content:''; flex:1; max-width:60px; height:1px; background:var(--y); opacity:.5;
}

.flag-hero {
  width:100px; height:66px; border-radius:3px; overflow:hidden;
  display:flex; margin-bottom:50px;
  box-shadow:0 0 0 1px rgba(255,255,255,.08), 0 20px 60px rgba(0,0,0,.6), 0 0 40px rgba(245,194,21,.2);
  opacity:0; animation:flag-appear 1s .4s cubic-bezier(.34,1.56,.64,1) forwards;
}
@keyframes flag-appear {
  from { opacity:0; transform:scale(.6) rotate(-5deg); }
  to   { opacity:1; transform:scale(1) rotate(0); }
}
.fl { width:33%; background:var(--r); display:flex; align-items:center; justify-content:center; font-size:1.2rem; }
.fr { width:67%; display:flex; flex-direction:column; }
.frg { flex:1; background:var(--g); }
.fry { flex:1; background:var(--y); }

.hero-title {
  font-family:'Cormorant Garamond',serif;
  font-weight:700; line-height:.88;
  margin-bottom:30px;
}
.hero-title .w1 {
  display:block;
  font-size:clamp(5rem,13vw,11rem);
  color:var(--cream);
  opacity:0; animation:fade-up .9s .55s cubic-bezier(.22,1,.36,1) forwards;
  letter-spacing:-.02em;
}
.hero-title .w2 {
  display:block;
  font-size:clamp(5rem,13vw,11rem);
  font-style:italic; color:var(--g);
  opacity:0; animation:fade-up .9s .7s cubic-bezier(.22,1,.36,1) forwards;
  letter-spacing:-.02em;
}
.hero-title .w3 {
  display:block;
  font-family:'DM Mono',monospace;
  font-size:clamp(.6rem,1.2vw,1rem);
  letter-spacing:.5em; color:rgba(237,232,220,.35);
  text-transform:uppercase; margin-top:18px; font-weight:300;
  opacity:0; animation:fade-up .9s .85s cubic-bezier(.22,1,.36,1) forwards;
}

.hero-sub {
  font-size:clamp(1rem,1.5vw,1.25rem);
  color:rgba(237,232,220,.6); max-width:480px;
  line-height:1.9; font-weight:300;
  opacity:0; animation:fade-up .9s 1s cubic-bezier(.22,1,.36,1) forwards;
  margin-bottom:60px;
}

.hero-stats {
  display:flex; gap:0;
  border:1px solid rgba(237,232,220,.08);
  opacity:0; animation:fade-up .9s 1.15s cubic-bezier(.22,1,.36,1) forwards;
}
.h-stat {
  padding:24px 48px;
  border-right:1px solid rgba(237,232,220,.08);
  text-align:center;
  position:relative; overflow:hidden;
  transition:background .4s;
}
.h-stat:last-child { border-right:none; }
.h-stat::before {
  content:''; position:absolute; inset:0;
  background:var(--glass2); opacity:0;
  transition:opacity .4s;
}
.h-stat:hover::before { opacity:1; }
.h-stat-n {
  font-family:'Cormorant Garamond',serif;
  font-size:2.2rem; font-weight:700; color:var(--y);
  display:block; line-height:1;
}
.h-stat-l {
  font-family:'DM Mono',monospace;
  font-size:.55rem; letter-spacing:.2em; text-transform:uppercase;
  color:rgba(237,232,220,.35); display:block; margin-top:6px;
}

.hero-scroll {
  position:absolute; bottom:40px;
  display:flex; flex-direction:column; align-items:center; gap:8px;
  opacity:0; animation:fade-in 1s 2s forwards;
}
.hero-scroll span {
  font-family:'DM Mono',monospace;
  font-size:.55rem; letter-spacing:.4em; text-transform:uppercase;
  color:rgba(245,194,21,.4);
}
.scroll-stem {
  width:1px; height:50px;
  background:linear-gradient(var(--y),transparent);
  animation:stem-pulse 1.6s ease-in-out infinite;
}
@keyframes stem-pulse {
  0%,100% { opacity:.3; transform:scaleY(1); }
  50% { opacity:1; transform:scaleY(1.15); }
}

@keyframes fade-up {
  from { opacity:0; transform:translateY(28px); }
  to   { opacity:1; transform:translateY(0); }
}
@keyframes fade-in {
  from { opacity:0; }
  to   { opacity:1; }
}

/* ─── TICKER ─────────────────────────────── */
.ticker {
  padding:14px 0; overflow:hidden;
  background:var(--r);
  border-top:1px solid rgba(255,255,255,.06);
  border-bottom:1px solid rgba(255,255,255,.06);
}
.ticker-wrap { display:flex; gap:64px; animation:ticker 28s linear infinite; }
.ticker-wrap2 { background:var(--g); animation-direction:reverse; animation-duration:36s; }
.t-item {
  font-family:'DM Mono',monospace;
  font-size:.65rem; letter-spacing:.2em; text-transform:uppercase;
  color:rgba(255,255,255,.85); white-space:nowrap;
  display:flex; align-items:center; gap:16px;
}
.t-dot { width:5px; height:5px; background:var(--y); border-radius:50%; flex-shrink:0; }
@keyframes ticker { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }

/* ─── SECTION COMMONS ────────────────────── */
.s { padding:130px 80px; position:relative; }
.s-eyebrow {
  font-family:'DM Mono',monospace;
  font-size:.62rem; letter-spacing:.5em; text-transform:uppercase;
  color:var(--y); margin-bottom:16px;
  display:flex; align-items:center; gap:14px;
}
.s-eyebrow::before { content:''; width:24px; height:1px; background:var(--y); }
.s-h {
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(2.8rem,5vw,5.5rem);
  font-weight:700; line-height:.95; margin-bottom:28px;
}
.s-rule { width:48px; height:2px; background:var(--y); margin-bottom:28px; }
.s-body { font-size:1.1rem; color:rgba(237,232,220,.62); line-height:1.9; max-width:560px; }

/* Reveal */
.rv {
  opacity:0; transform:translateY(40px);
  transition:opacity .85s cubic-bezier(.22,1,.36,1),
             transform .85s cubic-bezier(.22,1,.36,1);
}
.rv.on { opacity:1; transform:none; }
.rv-l { transform:translateX(-40px); }
.rv-l.on { transform:none; }
.rv-r { transform:translateX(40px); }
.rv-r.on { transform:none; }

/* Stagger delays */
.rv:nth-child(1){transition-delay:.0s}
.rv:nth-child(2){transition-delay:.08s}
.rv:nth-child(3){transition-delay:.16s}
.rv:nth-child(4){transition-delay:.24s}
.rv:nth-child(5){transition-delay:.32s}
.rv:nth-child(6){transition-delay:.40s}
.rv:nth-child(7){transition-delay:.48s}
.rv:nth-child(8){transition-delay:.56s}

/* ─── CAROUSEL ───────────────────────────── */
.carousel-s { padding:130px 0; overflow:hidden; }
.carousel-head { padding:0 80px; margin-bottom:64px; }

.carousel-viewport { overflow:hidden; position:relative; }
.carousel-track {
  display:flex; gap:20px; padding:0 80px;
  transition:transform .75s cubic-bezier(.77,0,.18,1);
  will-change:transform;
}
.c-slide {
  min-width:420px; height:540px;
  position:relative; flex-shrink:0; overflow:hidden;
  cursor:pointer;
}
.c-slide-inner {
  position:absolute; inset:0;
  display:flex; align-items:center; justify-content:center;
  font-size:9rem;
  transition:transform .8s cubic-bezier(.22,1,.36,1);
}
.c-slide:hover .c-slide-inner { transform:scale(1.1); }
.c-slide-grad {
  position:absolute; inset:0;
  background:linear-gradient(0deg,rgba(6,6,6,.92) 0%,rgba(6,6,6,.25) 45%,transparent 100%);
  transition:opacity .4s;
}
.c-slide-info {
  position:absolute; bottom:0; left:0; right:0;
  padding:36px;
  transform:translateY(8px);
  transition:transform .5s cubic-bezier(.22,1,.36,1);
}
.c-slide:hover .c-slide-info { transform:none; }
.c-tag {
  font-family:'DM Mono',monospace;
  font-size:.58rem; letter-spacing:.3em; text-transform:uppercase;
  color:var(--y); margin-bottom:8px; display:block;
}
.c-name {
  font-family:'Cormorant Garamond',serif;
  font-size:1.7rem; font-weight:700; line-height:1.15;
}
.c-desc {
  font-size:.9rem; color:rgba(237,232,220,.65);
  margin-top:8px; line-height:1.55;
  max-height:0; overflow:hidden;
  transition:max-height .5s ease;
}
.c-slide:hover .c-desc { max-height:60px; }
.c-controls {
  display:flex; align-items:center; gap:16px;
  padding:40px 80px 0;
}
.c-btn {
  width:52px; height:52px;
  border:1px solid rgba(245,194,21,.25); background:transparent;
  color:var(--y); font-size:1rem; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:all .3s; position:relative; overflow:hidden;
}
.c-btn::before {
  content:''; position:absolute; inset:0;
  background:var(--y); transform:scaleX(0); transform-origin:left;
  transition:transform .3s cubic-bezier(.22,1,.36,1);
}
.c-btn:hover { color:var(--k); }
.c-btn:hover::before { transform:scaleX(1); }
.c-btn span { position:relative; z-index:1; }
.c-dots { display:flex; gap:6px; margin-left:16px; }
.c-dot {
  height:6px; background:rgba(245,194,21,.25); border-radius:3px;
  cursor:pointer; width:6px;
  transition:width .4s cubic-bezier(.22,1,.36,1), background .3s;
}
.c-dot.a { width:28px; background:var(--y); }
.c-counter {
  margin-left:auto;
  font-family:'DM Mono',monospace;
  font-size:.65rem; letter-spacing:.2em;
  color:rgba(237,232,220,.3);
}
.c-counter b { color:var(--y); }

/* ─── ECONOMIA ────────────────────────────── */
.eco-s {
  background:
    radial-gradient(ellipse 70% 60% at 90% 50%, rgba(22,61,94,.15) 0%, transparent 60%),
    var(--k);
}
.eco-grid {
  display:grid; grid-template-columns:repeat(4,1fr);
  gap:1px; background:rgba(237,232,220,.05);
  margin-top:64px;
  border:1px solid rgba(237,232,220,.05);
}
.eco-c {
  background:var(--k);
  padding:40px 32px;
  position:relative; overflow:hidden;
  transition:background .35s;
}
.eco-c::after {
  content:''; position:absolute; bottom:0; left:0;
  width:0; height:2px;
  background:linear-gradient(90deg,var(--y),transparent);
  transition:width .5s cubic-bezier(.22,1,.36,1);
}
.eco-c:hover { background:rgba(245,194,21,.04); }
.eco-c:hover::after { width:100%; }
.eco-ic { font-size:1.8rem; margin-bottom:20px; opacity:.8; }
.eco-n {
  font-family:'Cormorant Garamond',serif;
  font-size:2rem; font-weight:700; color:var(--y);
  display:block; margin-bottom:6px; line-height:1;
}
.eco-lbl {
  font-family:'DM Mono',monospace;
  font-size:.6rem; letter-spacing:.15em; text-transform:uppercase;
  color:rgba(237,232,220,.5); display:block; margin-bottom:10px;
}
.eco-d { font-size:.88rem; color:rgba(237,232,220,.45); line-height:1.65; }

/* ─── MOEDA ──────────────────────────────── */
.moeda-s {
  background:linear-gradient(135deg,rgba(15,122,56,.08) 0%,transparent 50%),var(--k);
}
.moeda-layout {
  display:grid; grid-template-columns:auto 1fr;
  gap:0; border:1px solid rgba(245,194,21,.12);
  overflow:hidden; margin-top:64px;
  max-width:900px;
}
.moeda-left {
  background:rgba(245,194,21,.04);
  border-right:1px solid rgba(245,194,21,.12);
  padding:60px 50px;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:16px;
}
.moeda-sym {
  font-family:'Cormorant Garamond',serif;
  font-size:6rem; font-weight:700; color:var(--y);
  line-height:1; position:relative;
  text-shadow:0 0 80px rgba(245,194,21,.25);
  animation:glow-pulse 3s ease-in-out infinite;
}
@keyframes glow-pulse {
  0%,100% { text-shadow:0 0 40px rgba(245,194,21,.2); }
  50%     { text-shadow:0 0 80px rgba(245,194,21,.45); }
}
.moeda-code {
  font-family:'DM Mono',monospace;
  font-size:.65rem; letter-spacing:.4em; color:rgba(237,232,220,.35); text-transform:uppercase;
}
.moeda-right { padding:50px; }
.moeda-right h3 {
  font-family:'Cormorant Garamond',serif;
  font-size:2rem; font-weight:700; margin-bottom:18px;
}
.moeda-right p { font-size:.98rem; color:rgba(237,232,220,.65); line-height:1.85; }
.moeda-pills {
  display:flex; gap:12px; margin-top:28px; flex-wrap:wrap;
}
.m-pill {
  padding:12px 20px;
  background:rgba(245,194,21,.07);
  border:1px solid rgba(245,194,21,.15);
  transition:all .3s;
}
.m-pill:hover { background:rgba(245,194,21,.14); border-color:rgba(245,194,21,.35); }
.m-pill span {
  font-family:'DM Mono',monospace;
  font-size:.55rem; letter-spacing:.2em; text-transform:uppercase;
  color:rgba(237,232,220,.4); display:block; margin-bottom:4px;
}
.m-pill strong {
  font-family:'Cormorant Garamond',serif;
  font-size:1.3rem; color:var(--y);
}

/* ─── CULINÁRIA ──────────────────────────── */
.food-s {
  background:radial-gradient(ellipse 80% 60% at 90% 60%, rgba(122,78,45,.14) 0%, transparent 55%), var(--k);
}
.food-grid {
  display:grid; grid-template-columns:repeat(3,1fr);
  gap:1px; background:rgba(237,232,220,.04);
  margin-top:64px;
}
.food-c {
  background:var(--k); position:relative; overflow:hidden;
  transition:background .4s;
  padding:44px 40px;
}
.food-c::before {
  content:''; position:absolute; top:0; right:0;
  width:0; height:0;
  border-style:solid;
  border-width:0 0 0 0;
  border-color:transparent transparent transparent var(--gold);
  transition:border-width .4s cubic-bezier(.22,1,.36,1);
  opacity:.4;
}
.food-c:hover { background:rgba(201,151,58,.05); }
.food-c:hover::before { border-width:0 60px 60px 0; border-color:transparent var(--gold) transparent transparent; }
.food-em { font-size:3.5rem; margin-bottom:22px; display:block; transition:transform .4s; }
.food-c:hover .food-em { transform:scale(1.15) rotate(-5deg); }
.food-nm {
  font-family:'Cormorant Garamond',serif;
  font-size:1.7rem; font-weight:700; color:var(--gold); margin-bottom:10px;
}
.food-tx { font-size:.93rem; color:rgba(237,232,220,.58); line-height:1.75; }
.food-tags { display:flex; flex-wrap:wrap; gap:6px; margin-top:16px; }
.food-tag {
  font-family:'DM Mono',monospace;
  font-size:.55rem; letter-spacing:.15em; text-transform:uppercase;
  padding:4px 10px; color:var(--y);
  background:rgba(245,194,21,.07);
  border:1px solid rgba(245,194,21,.15);
  transition:all .3s;
}
.food-c:hover .food-tag { background:rgba(245,194,21,.14); }

/* ─── CONDIMENTOS ────────────────────────── */
.cond-s { padding:0; }
.cond-accordion {
  display:flex; height:380px;
  border-top:1px solid rgba(237,232,220,.05);
  border-bottom:1px solid rgba(237,232,220,.05);
}
.cond-panel {
  flex:1; position:relative; overflow:hidden;
  cursor:pointer;
  transition:flex .6s cubic-bezier(.4,0,.2,1);
  display:flex; align-items:flex-end; padding:32px;
}
.cond-accordion:has(.cond-panel:hover) .cond-panel { flex:.25; }
.cond-accordion .cond-panel:hover { flex:2.5; }
.cond-bg-overlay {
  position:absolute; inset:0;
  transition:opacity .5s;
}
.cond-panel:hover .cond-bg-overlay { opacity:.35; }
.cp1 .cond-bg-overlay { background:linear-gradient(135deg,#0e3d1c,#1a7a3c); opacity:.2; }
.cp2 .cond-bg-overlay { background:linear-gradient(135deg,#3d1a0e,#7a3c1a); opacity:.2; }
.cp3 .cond-bg-overlay { background:linear-gradient(135deg,#3d350e,#c9973a); opacity:.2; }
.cp4 .cond-bg-overlay { background:linear-gradient(135deg,#0e2a3d,#163d5e); opacity
