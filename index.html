<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGH CELL - Controle de Lucro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0d1117; color: #e6edf3; }
        .glass-card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; }
        .input-dark { background: #0d1117; border: 1px solid #30363d; color: white; }
        .input-dark:focus { border-color: #58a6ff; outline: none; }
        .btn-blue { background-color: #238636; transition: 0.2s; }
        .btn-blue:hover { background-color: #2ea043; }
        .badge-gringo { background-color: #1d4ed8; color: white; }
        .badge-vitrine { background-color: #7c3aed; color: white; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <header class="mb-8 flex justify-between items-center border-b border-[#30363d] pb-4">
            <div>
                <h1 class="text-2xl font-bold text-white">AGH<span class="text-blue-500">CELL</span> <span class="text-xs font-normal text-gray-500 text-uppercase">Gestor de Lucro</span></h1>
                <p class="text-xs text-gray-400 mt-1">Preços blindados para revenda</p>
            </div>
            <button onclick="limparTudo()" class="text-xs text-red-500 hover:underline">Resetar Tudo</button>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <div class="glass-card p-5 h-fit">
                <h2 class="text-sm font-semibold mb-4 text-gray-400 uppercase tracking-wider">Novo Aparelho</h2>
                <div class="space-y-3">
                    <input type="text" id="p-nome" placeholder="Modelo (Ex: iPhone 15 Pro)" class="w-full p-2 rounded input-dark text-sm">
                    <input type="text" id="p-cor" placeholder="Cores (Ex: Natural, Titanium)" class="w-full p-2 rounded input-dark text-sm">
                    <select id="p-tipo" class="w-full p-2 rounded input-dark text-sm">
                        <option value="VITRINE">VITRINE (40 DIAS)</option>
                        <option value="GRINGO">GRINGO (6 MESES)</option>
                    </select>
                    <div class="grid grid-cols-2 gap-2">
                        <input type="number" id="p-custo" placeholder="Custo AGH" class="p-2 rounded input-dark text-sm">
                        <input type="number" id="p-venda" placeholder="Venda Sugerida" class="p-2 rounded input-dark text-sm">
                    </div>
                    <button onclick="adicionarProduto()" class="w-full btn-blue text-white font-bold py-2 rounded text-sm uppercase">Cadastrar</button>
                </div>
            </div>

            <div class="lg:col-span-3">
                <div class="glass-card overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead class="bg-[#1f242c] text-gray-400 text-[10px] uppercase">
                                <tr>
                                    <th class="p-4">Modelo / Cor</th>
                                    <th class="p-4">Tipo</th>
                                    <th class="p-4">Custo</th>
                                    <th class="p-4">Venda Final</th>
                                    <th class="p-4 text-green-400">Lucro</th>
                                    <th class="p-4 text-right">Ação</th>
                                </tr>
                            </thead>
                            <tbody id="tabela-corpo" class="divide-y divide-[#30363d]"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const DB_KEY = 'agh_cell_stock_v1';
        
        // DADOS DEFINITIVOS BASEADOS NA SUA LISTA
        const iniciais = [
            // VITRINE
            { id: 1, nome: "iPhone 16 128GB", cor: "Azul", tipo: "VITRINE", custo: 3500, venda: 4290 },
            { id: 2, nome: "iPhone 15 Pro Max 256GB", cor: "Blue", tipo: "VITRINE", custo: 3840, venda: 4690 },
            { id: 3, nome: "iPhone 15 Pro 128GB", cor: "White, Blue, Black", tipo: "VITRINE", custo: 3030, venda: 3790 },
            { id: 4, nome: "iPhone 14 Pro Max 128GB", cor: "Gold, White, Purple, Black", tipo: "VITRINE", custo: 2950, venda: 3650 },
            { id: 5, nome: "iPhone 14 128GB", cor: "White, Blue, Black", tipo: "VITRINE", custo: 1850, venda: 2490 },
            { id: 6, nome: "iPhone 13 128GB", cor: "White, Blue, Black, Pink, Green", tipo: "VITRINE", custo: 1750, venda: 2350 },
            // GRINGOS
            { id: 7, nome: " 16 Pro Max 256GB", cor: "Preto", tipo: "GRINGO", custo: 4800, venda: 5690 },
            { id: 8, nome: " 16 Pro 128GB", cor: "Preto, Desert", tipo: "GRINGO", custo: 4250, venda: 5050 },
            { id: 9, nome: " 14 Pro Max 256GB*", cor: "Roxo (Peça Desc)", tipo: "GRINGO", custo: 2000, venda: 2890 },
            { id: 10, nome: " 13 128GB", cor: "Verde, Azul, Preto, Rosa, Branco", tipo: "GRINGO", custo: 1700, venda: 2250 }
        ];

        let produtos = JSON.parse(localStorage.getItem(DB_KEY)) || iniciais;

        function adicionarProduto() {
            const nome = document.getElementById('p-nome').value.toUpperCase();
            const cor = document.getElementById('p-cor').value.toUpperCase();
            const tipo = document.getElementById('p-tipo').value;
            const custo = parseFloat(document.getElementById('p-custo').value) || 0;
            const venda = parseFloat(document.getElementById('p-venda').value) || 0;

            if(!nome || !custo || !venda) return alert("Preencha modelo, custo e venda!");

            produtos.push({ id: Date.now(), nome, cor, tipo, custo, venda });
            salvar();
            
            // Limpar campos
            ['p-nome', 'p-cor', 'p-custo', 'p-venda'].forEach(id => document.getElementById(id).value = '');
        }

        function deletar(id) {
            if(confirm("Remover este item da tabela?")) {
                produtos = produtos.filter(x => x.id !== id);
                salvar();
            }
        }

        function limparTudo() {
            if(confirm("Isso apagará todos os dados salvos. Continuar?")) {
                produtos = [];
                salvar();
            }
        }

        function salvar() {
            localStorage.setItem(DB_KEY, JSON.stringify(produtos));
            render();
        }

        function render() {
            const corpo = document.getElementById('tabela-corpo');
            corpo.innerHTML = '';

            produtos.sort((a, b) => b.custo - a.custo).forEach(p => {
                const lucro = p.venda - p.custo;

                corpo.innerHTML += `
                    <tr class="hover:bg-[#1c2128] transition border-b border-[#30363d]">
                        <td class="p-4">
                            <div class="font-bold text-sm text-white">${p.nome}</div>
                            <div class="text-[10px] text-gray-500 uppercase">${p.cor}</div>
                        </td>
                        <td class="p-4">
                            <span class="text-[9px] font-bold px-2 py-1 rounded ${p.tipo === 'GRINGO' ? 'badge-gringo' : 'badge-vitrine'}">
                                ${p.tipo}
                            </span>
                        </td>
                        <td class="p-4 text-xs text-gray-400">R$ ${p.custo.toLocaleString('pt-BR')}</td>
                        <td class="p-4 text-sm text-white font-bold">R$ ${p.venda.toLocaleString('pt-BR')}</td>
                        <td class="p-4 text-sm text-green-400 font-bold">R$ ${lucro.toLocaleString('pt-BR')}</td>
                        <td class="p-4 text-right">
                            <button onclick="deletar(${p.id})" class="text-gray-600 hover:text-red-500 transition">
                                <i class="fas fa-trash-alt"></i>
                            </button>
                        </td>
                    </tr>
                `;
            });
        }

        render();
    </script>
</body>
</html>
