<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guiné-Bissau — Jornada Cultural</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Crimson+Pro:wght@300;400;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --verde: #1a7a3c;
  --vermelho: #c8102e;
  --amarelo: #f5c518;
  --preto: #0a0a0a;
  --creme: #f0e8d8;
  --terra: #8b5e3c;
  --ouro: #d4a843;
  --mar: #1a4a6e;
  --areia: #e8d5a3;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html { scroll-behavior: smooth; }

body {
  font-family: 'Crimson Pro', serif;
  background: var(--preto);
  color: var(--creme);
  overflow-x: hidden;
  cursor: none;
}

/* CURSOR CUSTOMIZADO */
.cursor {
  width: 12px; height: 12px;
  background: var(--amarelo);
  border-radius: 50%;
  position: fixed; top: 0; left: 0;
  pointer-events: none; z-index: 9999;
  transform: translate(-50%, -50%);
  transition: transform 0.1s, width 0.3s, height 0.3s;
  mix-blend-mode: difference;
}
.cursor-ring {
  width: 40px; height: 40px;
  border: 1px solid rgba(245,197,24,0.5);
  border-radius: 50%;
  position: fixed; top: 0; left: 0;
  pointer-events: none; z-index: 9998;
  transform: translate(-50%, -50%);
  transition: transform 0.15s ease-out, width 0.3s, height 0.3s;
}

/* NAVBAR */
nav {
  position: fixed; top: 0; width: 100%; z-index: 1000;
  padding: 20px 60px;
  display: flex; justify-content: space-between; align-items: center;
  background: linear-gradient(180deg, rgba(10,10,10,0.95) 0%, transparent 100%);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid rgba(245,197,24,0.15);
}
.nav-logo {
  font-family: 'Playfair Display', serif;
  font-size: 1.4rem;
  color: var(--amarelo);
  letter-spacing: 3px;
  text-transform: uppercase;
}
.nav-flag {
  display: flex; gap: 3px; align-items: center;
}
.flag-strip { height: 20px; width: 10px; }
.flag-r { background: var(--vermelho); }
.flag-star { font-size: 12px; color: #000; }
.nav-links { display: flex; gap: 30px; }
.nav-links a {
  color: var(--creme); text-decoration: none;
  font-family: 'Space Mono', monospace;
  font-size: 0.75rem; letter-spacing: 2px; text-transform: uppercase;
  transition: color 0.3s;
  position: relative;
}
.nav-links a::after {
  content: ''; position: absolute; bottom: -4px; left: 0;
  width: 0; height: 1px; background: var(--amarelo);
  transition: width 0.3s;
}
.nav-links a:hover { color: var(--amarelo); }
.nav-links a:hover::after { width: 100%; }

/* HERO */
.hero {
  min-height: 100vh;
  display: flex; flex-direction: column; justify-content: center; align-items: center;
  position: relative; overflow: hidden;
  background: radial-gradient(ellipse at 30% 50%, rgba(26,122,60,0.25) 0%, transparent 60%),
              radial-gradient(ellipse at 70% 80%, rgba(200,16,46,0.2) 0%, transparent 60%),
              radial-gradient(ellipse at 50% 10%, rgba(245,197,24,0.1) 0%, transparent 50%),
              var(--preto);
}

.hero-bg-pattern {
  position: absolute; inset: 0;
  background-image: repeating-linear-gradient(
    -45deg,
    transparent,
    transparent 40px,
    rgba(245,197,24,0.02) 40px,
    rgba(245,197,24,0.02) 41px
  );
}

.hero-particles {
  position: absolute; inset: 0;
  pointer-events: none;
}
.particle {
  position: absolute;
  border-radius: 50%;
  animation: float-particle linear infinite;
  opacity: 0.4;
}

@keyframes float-particle {
  0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
  10% { opacity: 0.4; }
  90% { opacity: 0.4; }
  100% { transform: translateY(-100px) rotate(720deg); opacity: 0; }
}

.hero-eyebrow {
  font-family: 'Space Mono', monospace;
  font-size: 0.7rem; letter-spacing: 8px; text-transform: uppercase;
  color: var(--amarelo); margin-bottom: 30px;
  animation: fadeSlideDown 1.2s ease forwards;
  opacity: 0;
}
.hero-title {
  font-family: 'Playfair Display', serif;
  font-size: clamp(4rem, 10vw, 9rem);
  font-weight: 900; line-height: 0.9;
  text-align: center;
  animation: fadeSlideUp 1.2s ease 0.3s forwards;
  opacity: 0;
}
.hero-title .line1 { display: block; color: var(--creme); }
.hero-title .line2 { display: block; color: var(--verde); font-style: italic; }
.hero-title .line3 { display: block; color: var(--amarelo); font-size: 0.45em; letter-spacing: 15px; text-transform: uppercase; font-style: normal; margin-top: 20px; }

.hero-subtitle {
  font-size: 1.15rem; color: rgba(240,232,216,0.7);
  max-width: 500px; text-align: center;
  margin-top: 30px; line-height: 1.8;
  animation: fadeSlideUp 1.2s ease 0.6s forwards;
  opacity: 0;
}

.hero-stats {
  display: flex; gap: 60px; margin-top: 60px;
  animation: fadeSlideUp 1.2s ease 0.9s forwards;
  opacity: 0;
}
.stat { text-align: center; }
.stat-num {
  font-family: 'Playfair Display', serif;
  font-size: 2.5rem; color: var(--amarelo); font-weight: 700;
  display: block;
}
.stat-label {
  font-family: 'Space Mono', monospace;
  font-size: 0.6rem; letter-spacing: 3px; text-transform: uppercase;
  color: rgba(240,232,216,0.5); margin-top: 5px; display: block;
}

.scroll-indicator {
  position: absolute; bottom: 40px;
  display: flex; flex-direction: column; align-items: center; gap: 10px;
  animation: pulse-bounce 2s ease-in-out infinite;
  animation-delay: 2s;
  opacity: 0;
}
.scroll-indicator.visible { opacity: 1; }
.scroll-line {
  width: 1px; height: 60px;
  background: linear-gradient(180deg, var(--amarelo), transparent);
}
.scroll-text {
  font-family: 'Space Mono', monospace;
  font-size: 0.6rem; letter-spacing: 4px;
  color: rgba(245,197,24,0.6); text-transform: uppercase;
  writing-mode: vertical-rl;
}

@keyframes pulse-bounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(10px); }
}

@keyframes fadeSlideDown {
  from { opacity: 0; transform: translateY(-30px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes fadeSlideUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

/* BANDEIRA ANIMADA */
.flag-container {
  margin: 40px 0;
  animation: fadeSlideUp 1.2s ease 0.5s forwards;
  opacity: 0;
}
.flag-gb {
  width: 120px; height: 80px;
  display: flex; border-radius: 4px; overflow: hidden;
  box-shadow: 0 0 30px rgba(245,197,24,0.3), 0 20px 60px rgba(0,0,0,0.5);
  position: relative;
}
.flag-left {
  width: 33%;
  background: var(--vermelho);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.5rem;
}
.flag-right {
  width: 67%; display: flex; flex-direction: column;
}
.flag-green { flex: 1; background: var(--verde); }
.flag-yellow { flex: 1; background: var(--amarelo); }

/* SEÇÃO PADRÃO */
section {
  padding: 120px 60px;
  position: relative;
}

.section-label {
  font-family: 'Space Mono', monospace;
  font-size: 0.65rem; letter-spacing: 6px; text-transform: uppercase;
  color: var(--amarelo); margin-bottom: 20px;
  display: flex; align-items: center; gap: 15px;
}
.section-label::before {
  content: '';
  display: inline-block; width: 30px; height: 1px; background: var(--amarelo);
}

.section-title {
  font-family: 'Playfair Display', serif;
  font-size: clamp(2.5rem, 5vw, 5rem);
  font-weight: 900; line-height: 1.05;
  margin-bottom: 40px;
}

/* DADOS ECONÔMICOS */
.economia {
  background: linear-gradient(135deg, rgba(26,74,110,0.15) 0%, transparent 60%),
              var(--preto);
}
.economia-grid {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 2px;
  margin-top: 60px;
}
.eco-card {
  background: rgba(240,232,216,0.04);
  border: 1px solid rgba(245,197,24,0.1);
  padding: 40px 30px;
  position: relative; overflow: hidden;
  transition: all 0.4s ease;
  cursor: default;
}
.eco-card::before {
  content: ''; position: absolute; top: 0; left: 0;
  width: 3px; height: 0;
  background: var(--amarelo);
  transition: height 0.4s ease;
}
.eco-card:hover { background: rgba(245,197,24,0.06); transform: translateY(-5px); }
.eco-card:hover::before { height: 100%; }
.eco-icon { font-size: 2rem; margin-bottom: 20px; }
.eco-num {
  font-family: 'Playfair Display', serif;
  font-size: 2.2rem; font-weight: 700; color: var(--amarelo);
  display: block; margin-bottom: 8px;
}
.eco-desc { font-size: 0.85rem; color: rgba(240,232,216,0.6); line-height: 1.6; }
.eco-label {
  font-family: 'Space Mono', monospace;
  font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase;
  color: var(--creme); margin-bottom: 10px; display: block;
}

/* MOEDA */
.moeda-section {
  background: linear-gradient(135deg, rgba(26,122,60,0.1) 0%, transparent 50%), var(--preto);
}
.moeda-card {
  display: flex; align-items: center; gap: 60px;
  background: rgba(240,232,216,0.03);
  border: 1px solid rgba(245,197,24,0.15);
  padding: 50px; border-radius: 2px;
  max-width: 800px;
}
.moeda-symbol {
  font-family: 'Playfair Display', serif;
  font-size: 8rem; color: var(--amarelo); font-weight: 900; line-height: 1;
  text-shadow: 0 0 60px rgba(245,197,24,0.3);
}
.moeda-info h3 {
  font-family: 'Playfair Display', serif;
  font-size: 2rem; margin-bottom: 15px;
}
.moeda-info p { color: rgba(240,232,216,0.7); line-height: 1.8; font-size: 1rem; }

/* CARROSSEL */
.carousel-section {
  padding: 120px 0;
  overflow: hidden;
}
.carousel-header { padding: 0 60px; margin-bottom: 60px; }

.carousel-track-wrapper {
  position: relative; overflow: hidden;
}
.carousel-track {
  display: flex; gap: 24px;
  padding: 0 60px;
  transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
}
.carousel-slide {
  min-width: 400px; height: 500px;
  position: relative; flex-shrink: 0;
  overflow: hidden; border-radius: 2px;
  cursor: pointer;
}
.slide-bg {
  width: 100%; height: 100%;
  object-fit: cover;
  transition: transform 0.6s ease;
  background-size: cover; background-position: center;
}
.carousel-slide:hover .slide-bg { transform: scale(1.08); }
.slide-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(0deg, rgba(10,10,10,0.9) 0%, rgba(10,10,10,0.2) 50%, transparent 100%);
  display: flex; flex-direction: column; justify-content: flex-end;
  padding: 30px;
}
.slide-tag {
  font-family: 'Space Mono', monospace;
  font-size: 0.6rem; letter-spacing: 3px; text-transform: uppercase;
  color: var(--amarelo); margin-bottom: 10px;
}
.slide-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.5rem; font-weight: 700; line-height: 1.2;
}
.slide-desc { font-size: 0.85rem; color: rgba(240,232,216,0.7); margin-top: 8px; line-height: 1.5; }

.carousel-controls {
  display: flex; gap: 15px; padding: 40px 60px 0;
  align-items: center;
}
.carousel-btn {
  width: 50px; height: 50px;
  border: 1px solid rgba(245,197,24,0.3);
  background: transparent; color: var(--amarelo);
  font-size: 1.2rem; cursor: pointer;
  transition: all 0.3s; display: flex; align-items: center; justify-content: center;
}
.carousel-btn:hover { background: var(--amarelo); color: var(--preto); }
.carousel-dots { display: flex; gap: 8px; margin-left: 20px; }
.carousel-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: rgba(245,197,24,0.3); cursor: pointer;
  transition: all 0.3s;
}
.carousel-dot.active { background: var(--amarelo); width: 24px; border-radius: 3px; }

/* CULINÁRIA */
.culinaria {
  background: radial-gradient(ellipse at 80% 50%, rgba(139,94,60,0.15) 0%, transparent 60%),
              var(--preto);
}
.food-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px;
  margin-top: 60px;
}
.food-card {
  position: relative; overflow: hidden;
  background: rgba(240,232,216,0.03);
  border: 1px solid rgba(139,94,60,0.2);
  transition: all 0.4s ease;
}
.food-card:hover { border-color: rgba(212,168,67,0.5); }
.food-emoji {
  font-size: 4rem; padding: 40px 40px 20px;
  display: block;
}
.food-content { padding: 0 40px 40px; }
.food-name {
  font-family: 'Playfair Display', serif;
  font-size: 1.6rem; font-weight: 700; margin-bottom: 10px;
  color: var(--ouro);
}
.food-desc { color: rgba(240,232,216,0.65); line-height: 1.7; font-size: 0.95rem; }
.food-ingredients {
  margin-top: 15px;
  display: flex; flex-wrap: wrap; gap: 6px;
}
.ingredient-tag {
  font-family: 'Space Mono', monospace;
  font-size: 0.6rem; letter-spacing: 1px;
  background: rgba(245,197,24,0.1); color: var(--amarelo);
  padding: 4px 10px; border: 1px solid rgba(245,197,24,0.2);
}

/* CONDIMENTOS / INGREDIENTES */
.condimentos {
  background: var(--preto);
}
.condimentos-scroll {
  display: flex; gap: 0;
  margin-top: 60px;
  overflow: hidden;
}
.condimento-item {
  flex: 1; min-height: 300px;
  display: flex; flex-direction: column; justify-content: flex-end;
  padding: 30px;
  position: relative; overflow: hidden;
  cursor: pointer;
  transition: flex 0.6s cubic-bezier(0.4, 0, 0.2, 1);
}
.condimentos-scroll:has(.condimento-item:hover) .condimento-item { flex: 0.3; }
.condimentos-scroll .condimento-item:hover { flex: 2; }
.condimento-item .cond-bg {
  position: absolute; inset: 0;
  font-size: 8rem; display: flex; align-items: center; justify-content: center;
  filter: blur(2px); opacity: 0.15;
  transition: opacity 0.4s;
}
.condimento-item:hover .cond-bg { opacity: 0.25; filter: blur(0); }
.cond-bg-color-1 { background: linear-gradient(135deg, #2d5a1b, #1a7a3c); }
.cond-bg-color-2 { background: linear-gradient(135deg, #5a3a1b, #8b5e3c); }
.cond-bg-color-3 { background: linear-gradient(135deg, #5a4a1b, #d4a843); }
.cond-bg-color-4 { background: linear-gradient(135deg, #1b3a5a, #1a4a6e); }
.cond-bg-color-5 { background: linear-gradient(135deg, #5a1b1b, #c8102e); }
.condimento-name {
  font-family: 'Playfair Display', serif;
  font-size: 1.2rem; font-weight: 700; position: relative; z-index: 1;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.condimento-desc {
  font-size: 0.8rem; color: rgba(240,232,216,0.6);
  position: relative; z-index: 1;
  max-height: 0; overflow: hidden;
  transition: max-height 0.4s ease;
  line-height: 1.6; margin-top: 0;
}
.condimento-item:hover .condimento-desc { max-height: 100px; margin-top: 10px; }

/* ETNIAS */
.etnias {
  background: linear-gradient(135deg, rgba(26,74,110,0.1) 0%, transparent 50%), var(--preto);
}
.etnias-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px;
  margin-top: 60px;
}
.etnia-card {
  padding: 40px;
  border: 1px solid rgba(240,232,216,0.06);
  position: relative; overflow: hidden;
  transition: all 0.4s ease;
}
.etnia-card::before {
  content: '';
  position: absolute; bottom: 0; left: 0; right: 0;
  height: 3px;
  transition: all 0.4s;
}
.etnia-card:nth-child(1)::before { background: var(--verde); }
.etnia-card:nth-child(2)::before { background: var(--vermelho); }
.etnia-card:nth-child(3)::before { background: var(--amarelo); }
.etnia-card:nth-child(4)::before { background: var(--mar); }
.etnia-card:nth-child(5)::before { background: var(--terra); }
.etnia-card:nth-child(6)::before { background: var(--ouro); }
.etnia-card:hover { background: rgba(240,232,216,0.03); transform: translateY(-5px); }
.etnia-num {
  font-family: 'Space Mono', monospace;
  font-size: 0.65rem; letter-spacing: 3px;
  color: rgba(240,232,216,0.3); margin-bottom: 20px; display: block;
}
.etnia-name {
  font-family: 'Playfair Display', serif;
  font-size: 1.8rem; font-weight: 700; margin-bottom: 15px;
}
.etnia-desc { color: rgba(240,232,216,0.65); line-height: 1.7; font-size: 0.95rem; }

/* MÚSICA */
.musica {
  background: radial-gradient(ellipse at 20% 50%, rgba(200,16,46,0.12) 0%, transparent 60%), var(--preto);
  overflow: hidden;
}
.musica-content {
  display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: center;
  margin-top: 60px;
}
.musica-text p {
  color: rgba(240,232,216,0.7); line-height: 1.9; font-size: 1.05rem;
  margin-bottom: 20px;
}
.instruments-grid {
  display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px;
  margin-top: 30px;
}
.instrument {
  display: flex; align-items: center; gap: 15px;
  padding: 20px;
  background: rgba(240,232,216,0.04);
  border: 1px solid rgba(240,232,216,0.08);
  transition: all 0.3s;
}
.instrument:hover { border-color: rgba(245,197,24,0.3); background: rgba(245,197,24,0.05); }
.instrument-icon { font-size: 1.8rem; }
.instrument-name { font-family: 'Playfair Display', serif; font-size: 1rem; }
.instrument-sub { font-size: 0.75rem; color: rgba(240,232,216,0.4); margin-top: 2px; }

.music-visual {
  position: relative; height: 400px;
  display: flex; align-items: center; justify-content: center;
}
.sound-wave {
  display: flex; align-items: center; gap: 6px; height: 200px;
}
.wave-bar {
  width: 8px; background: var(--verde); border-radius: 4px;
  animation: wave-anim 1.2s ease-in-out infinite;
}
.wave-bar:nth-child(even) { background: var(--amarelo); }
.wave-bar:nth-child(3n) { background: var(--vermelho); }

@keyframes wave-anim {
  0%, 100% { height: 20px; opacity: 0.4; }
  50% { height: var(--h, 100px); opacity: 1; }
}

/* FUTEBOL */
.futebol {
  background: linear-gradient(135deg, rgba(26,122,60,0.15) 0%, var(--preto) 60%);
}
.futebol-content {
  display: grid; grid-template-columns: 1fr 1fr; gap: 80px;
  margin-top: 60px; align-items: start;
}
.futebol-text p {
  color: rgba(240,232,216,0.7); line-height: 1.9; font-size: 1.05rem;
  margin-bottom: 20px;
}
.futebol-stats-grid {
  display: grid; grid-template-columns: repeat(2, 1fr); gap: 2px;
}
.fstat {
  background: rgba(240,232,216,0.04);
  border: 1px solid rgba(26,122,60,0.2);
  padding: 30px;
  transition: all 0.3s;
}
.fstat:hover { background: rgba(26,122,60,0.1); border-color: rgba(26,122,60,0.5); }
.fstat-num {
  font-family: 'Playfair Display', serif;
  font-size: 2rem; color: var(--verde); font-weight: 700; display: block;
}
.fstat-label { font-size: 0.8rem; color: rgba(240,232,216,0.5); margin-top: 5px; display: block; }

.notoriety-list { margin-top: 30px; }
.notoriety-item {
  display: flex; align-items: center; gap: 20px;
  padding: 20px 0; border-bottom: 1px solid rgba(240,232,216,0.06);
}
.notoriety-item:last-child { border-bottom: none; }
.notoriety-num {
  font-family: 'Playfair Display', serif;
  font-size: 2.5rem; color: rgba(26,122,60,0.4); font-weight: 900; min-width: 60px;
}
.notoriety-info h4 { font-family: 'Playfair Display', serif; font-size: 1.2rem; }
.notoriety-info p { font-size: 0.85rem; color: rgba(240,232,216,0.5); margin-top: 3px; }

/* LOCALIZAÇÃO */
.localizacao {
  background: radial-gradient(ellipse at 50% 30%, rgba(26,74,110,0.2) 0%, transparent 70%), var(--preto);
}
.localizacao-content {
  display: grid; grid-template-columns: 1fr 1fr; gap: 80px;
  margin-top: 60px; align-items: start;
}
.localizacao-text p {
  color: rgba(240,232,216,0.7); line-height: 1.9; font-size: 1.05rem;
  margin-bottom: 20px;
}
.geo-facts {
  display: flex; flex-direction: column; gap: 15px; margin-top: 30px;
}
.geo-fact {
  display: flex; align-items: flex-start; gap: 20px;
  padding: 20px;
  background: rgba(240,232,216,0.03);
  border-left: 2px solid var(--mar);
}
.geo-fact-icon { font-size: 1.5rem; }
.geo-fact-text strong { display: block; color: var(--creme); margin-bottom: 5px; }
.geo-fact-text span { font-size: 0.85rem; color: rgba(240,232,216,0.5); }

.map-visual {
  position: relative;
}
.africa-map {
  width: 100%; max-width: 400px;
  fill: rgba(240,232,216,0.08);
