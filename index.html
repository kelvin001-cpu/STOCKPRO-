<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockPro Ultra - Gestão & Bot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #05070a; color: #e2e8f0; }
        .glass-card { background: rgba(17, 24, 39, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 1rem; }
        .input-dark { background: #111827; border: 1px solid #374151; color: white; transition: all 0.3s ease; }
        .input-dark:focus { border-color: #3b82f6; outline: none; box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2); }
        .btn-primary { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); transition: transform 0.2s; }
        .btn-primary:hover { transform: translateY(-2px); }
        
        #chat-container { position: fixed; bottom: 20px; right: 20px; width: 300px; z-index: 50; display: none; }
        .chat-bubble { background: #1f2937; border: 1px solid #3b82f6; border-radius: 15px 15px 0 15px; padding: 10px; margin-bottom: 10px; font-size: 0.85rem; }
        
        .status-badge { padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; text-transform: uppercase; }
        .status-esgotado { background: #450a0a; color: #f87171; border: 1px solid #7f1d1d; }
        .status-estoque { background: #064e3b; color: #34d399; border: 1px solid #065f46; }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-10 pb-24">

    <div class="max-w-7xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-10 gap-6">
            <div>
                <h1 class="text-4xl font-extrabold text-white tracking-tighter">
                    STOCK<span class="text-blue-500 italic">PRO</span> <span class="text-xs font-light text-slate-500 ml-2">v2.5 ULTRA</span>
                </h1>
                <p class="text-slate-400 mt-1">Gestão de estoque com Assistente e Filtros Avançados.</p>
            </div>
            <div class="flex gap-3 bg-gray-900/50 p-1 rounded-xl border border-gray-800">
                <button onclick="filtrar('todos')" class="px-5 py-2 rounded-lg hover:bg-gray-800 transition text-sm font-semibold">TUDO</button>
                <button onclick="filtrar('falta')" class="px-5 py-2 rounded-lg text-red-400 hover:bg-red-900/20 transition text-sm font-semibold">FALTANDO</button>
                <button onclick="exportarDados()" class="px-5 py-2 rounded-lg text-blue-400 hover:bg-blue-900/20 transition text-sm font-semibold"><i class="fas fa-download mr-2"></i>BACKUP</button>
            </div>
        </header>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-10">
            <div class="glass-card p-6 border-l-4 border-blue-500">
                <span class="text-slate-500 text-xs font-bold uppercase">Investimento</span>
                <h2 id="total-investido" class="text-2xl font-bold mt-1 text-white">R$ 0,00</h2>
            </div>
            <div class="glass-card p-6 border-l-4 border-green-500">
                <span class="text-slate-500 text-xs font-bold uppercase">Lucro Projetado</span>
                <h2 id="total-lucro" class="text-2xl font-bold mt-1 text-green-400">R$ 0,00</h2>
            </div>
            <div class="glass-card p-6 border-l-4 border-purple-500">
                <span class="text-slate-500 text-xs font-bold uppercase">Mix de Itens</span>
                <h2 id="total-itens" class="text-2xl font-bold mt-1 text-white">0</h2>
            </div>
            <div class="glass-card p-6 border-l-4 border-orange-500">
                <span class="text-slate-500 text-xs font-bold uppercase">Margem Média</span>
                <h2 id="margem-media" class="text-2xl font-bold mt-1 text-orange-400">0%</h2>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="glass-card p-6 h-fit">
                <h3 class="text-lg font-bold mb-4 flex items-center text-blue-500"><i class="fas fa-plus-circle mr-2"></i>Novo Item</h3>
                <div class="space-y-4">
                    <input type="text" id="p-nome" placeholder="Nome do Produto" class="w-full p-3 rounded-lg input-dark">
                    <input type="text" id="p-img" placeholder="URL da Imagem" class="w-full p-3 rounded-lg input-dark text-xs">
                    <div class="grid grid-cols-2 gap-4">
                        <input type="number" id="p-custo" placeholder="Custo R$" class="p-3 rounded-lg input-dark">
                        <input type="number" id="p-venda" placeholder="Venda R$" class="p-3 rounded-lg input-dark">
                    </div>
                    <input type="number" id="p-qtd" placeholder="Quantidade" class="w-full p-3 rounded-lg input-dark">
                    <button onclick="adicionarProduto()" class="w-full btn-primary text-white font-bold py-3 rounded-lg">ADICIONAR</button>
                </div>
            </div>

            <div class="lg:col-span-2">
                <div class="glass-card p-4 mb-4 flex items-center px-6">
                    <i class="fas fa-search text-slate-500 mr-4"></i>
                    <input type="text" id="busca" onkeyup="render()" placeholder="Buscar na lista..." class="w-full bg-transparent border-none outline-none text-lg">
                </div>

                <div class="glass-card overflow-hidden">
                    <table class="w-full text-left">
                        <thead class="bg-gray-800/50 text-slate-400 text-xs uppercase">
                            <tr>
                                <th class="p-4">Produto / Status</th>
                                <th class="p-4 text-center">Qtd</th>
                                <th class="p-4">Custo/Venda</th>
                                <th class="p-4">Lucro</th>
                                <th class="p-4 text-right">Ação</th>
                            </tr>
                        </thead>
                        <tbody id="tabela-corpo" class="text-sm"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div id="chat-container" class="glass-card p-4 shadow-2xl border-blue-500/50">
        <div class="flex justify-between items-center mb-4 border-b border-gray-700 pb-2">
            <span class="font-bold text-blue-400 text-sm"><i class="fas fa-robot mr-2"></i>Assistente</span>
            <button onclick="toggleChat()" class="text-slate-500 hover:text-white">×</button>
        </div>
        <div id="chat-content" class="h-40 overflow-y-auto mb-4 space-y-2 text-[11px]">
            <div class="chat-bubble">Insira o custo e a margem para calcular a venda ideal.</div>
        </div>
        <div class="space-y-2">
            <input type="number" id="bot-custo" placeholder="Custo R$" class="w-full p-2 text-xs rounded input-dark">
            <input type="number" id="bot-lucro" placeholder="Margem %" class="w-full p-2 text-xs rounded input-dark">
            <button onclick="calcularBot()" class="w-full bg-blue-600 text-[10px] font-bold py-2 rounded">CALCULAR</button>
        </div>
    </div>

    <button onclick="toggleChat()" class="fixed bottom-5 right-5 w-14 h-14 bg-blue-600 rounded-full flex items-center justify-center text-white hover:scale-110 transition-all z-50 shadow-lg shadow-blue-500/40">
        <i class="fas fa-calculator text-xl"></i>
    </button>

    <script>
        const DATABASE_KEY = 'produtos_v2';
        let filtroAtual = 'todos';

        const itensIniciais = [
            { id: 1, nome: "AIR PODS MAX", custo: 160.00, venda: 190.00, qtd: 1, img: "" },
            { id: 2, nome: "FONE M90 PRO", custo: 30.00, venda: 40.00, qtd: 1, img: "" },
            { id: 3, nome: "POWER BANK INOVA", custo: 35.00, venda: 50.00, qtd: 1, img: "" },
            { id: 13, nome: "CARREGADOR TURBO IPHONE 20W", custo: 35.00, venda: 50.00, qtd: 1, img: "" },
            { id: 16, nome: "AIR PODS PRO (COM BORRACHA)", custo: 80.00, venda: 130.00, qtd: 1, img: "" }
        ];

        let produtos = JSON.parse(localStorage.getItem(DATABASE_KEY)) || itensIniciais;

        function toggleChat() {
            const chat = document.getElementById('chat-container');
            chat.style.display = chat.style.display === 'block' ? 'none' : 'block';
        }

        function adicionarProduto() {
            const nome = document.getElementById('p-nome').value.toUpperCase();
            const img = document.getElementById('p-img').value;
            const custo = parseFloat(document.getElementById('p-custo').value);
            const venda = parseFloat(document.getElementById('p-venda').value);
            const qtd = parseInt(document.getElementById('p-qtd').value) || 0;
            if(!nome || isNaN(custo) || isNaN(venda)) return alert("Preencha os campos!");
            produtos.push({ id: Date.now(), nome, custo, venda, qtd, img });
            salvar();
            document.querySelectorAll('input').forEach(i => i.value = '');
        }

        function alterarQtd(id, delta) {
            const p = produtos.find(p => p.id === id);
            p.qtd = Math.max(0, p.qtd + delta);
            salvar();
        }

        function deletar(id) {
            if(confirm("Remover?")) { produtos = produtos.filter(p => p.id !== id); salvar(); }
        }

        function salvar() {
            localStorage.setItem(DATABASE_KEY, JSON.stringify(produtos));
            render();
        }

        function filtrar(tipo) {
            filtroAtual = tipo;
            render();
        }

        function render() {
            const corpo = document.getElementById('tabela-corpo');
            const busca = document.getElementById('busca').value.toUpperCase();
            corpo.innerHTML = '';
            let inv = 0, luc = 0, margTotal = 0, count = 0;

            produtos.forEach(p => {
                if(filtroAtual === 'falta' && p.qtd > 0) return;
                if(busca && !p.nome.includes(busca)) return;

                const lucroU = p.venda - p.custo;
                const marg = ((lucroU / p.venda) * 100) || 0;
                const isEsgotado = p.qtd <= 0;

                inv += (p.custo * p.qtd);
                luc += (lucroU * p.qtd);
                margTotal += marg;
                count++;

                corpo.innerHTML += `
                    <tr class="border-t border-gray-800 hover:bg-white/5 transition">
                        <td class="p-4">
                            <div class="flex items-center gap-3">
                                <img src="${p.img || 'https://placehold.co/40x40/111827/white?text=?'}" class="w-10 h-10 rounded-lg object-contain bg-white">
                                <div>
                                    <div class="font-bold ${isEsgotado ? 'text-red-400' : 'text-white'}">${p.nome}</div>
                                    <span class="status-badge ${isEsgotado ? 'status-esgotado' : 'status-estoque'}">
                                        ${isEsgotado ? 'Esgotado' : 'Ativo'}
                                    </span>
                                </div>
                            </div>
                        </td>
                        <td class="p-4 text-center">
                            <div class="flex items-center justify-center gap-2 bg-gray-900 rounded p-1">
                                <button onclick="alterarQtd(${p.id}, -1)" class="w-6 h-6 hover:text-red-500">-</button>
                                <span class="font-bold w-8">${p.qtd}</span>
                                <button onclick="alterarQtd(${p.id}, 1)" class="w-6 h-6 hover:text-green-500">+</button>
                            </div>
                        </td>
                        <td class="p-4 text-xs text-slate-400">C: ${p.custo.toFixed(2)}<br><b class="text-white text-sm">V: ${p.venda.toFixed(2)}</b></td>
                        <td class="p-4 font-bold text-green-400">R$ ${(lucroU * p.qtd).toFixed(2)}</td>
                        <td class="p-4 text-right"><button onclick="deletar(${p.id})" class="text-gray-600 hover:text-red-500"><i class="fas fa-trash"></i></button></td>
                    </tr>
                `;
            });

            document.getElementById('total-investido').innerText = `R$ ${inv.toFixed(2)}`;
            document.getElementById('total-lucro').innerText = `R$ ${luc.toFixed(2)}`;
            document.getElementById('total-itens').innerText = count;
            document.getElementById('margem-media').innerText = `${(margTotal / (produtos.length || 1)).toFixed(1)}%`;
        }

        function exportarDados() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(produtos));
            const dl = document.createElement('a');
            dl.setAttribute("href", dataStr);
            dl.setAttribute("download", "estoque_backup.json");
            dl.click();
        }

        function calcularBot() {
            const custo = parseFloat(document.getElementById('bot-custo').value);
            const margem = parseFloat(document.getElementById('bot-lucro').value) || 30;
            if(!custo) return;
            const vendaIdeal = custo / (1 - (margem / 100));
            document.getElementById('chat-content').innerHTML += `<div class="chat-bubble bg-blue-900/20">Custo R$${custo} + ${margem}% margem = <b>Venda R$${vendaIdeal.toFixed(2)}</b></div>`;
        }

        render();
    </script>
</body>
</html>
